<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор сложного процента</title>
    <style>
        /* Базовые стили */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f4f4f9; 
            padding: 20px; 
            color: #333; 
            margin: 0;
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: #fff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { 
            text-align: center; 
            margin-top: 0; 
            margin-bottom: 25px;
            color: #2c3e50;
        }

        /* Настройка центрированных строк с полями */
        .input-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .input-group {
            flex: 1 1 200px;
            max-width: 220px;
        }
        
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #4a5568;
            text-align: center;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
            text-align: center;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        button { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            width: 100%; 
            font-weight: bold; 
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover { background: #2563eb; }

        /* Оповещения */
        .alerts-container { margin-top: 20px; }
        .goal-alert { 
            padding: 12px; 
            background: #dcfce7; 
            color: #166534; 
            border-radius: 8px; 
            margin-top: 10px; 
            display: none; 
            text-align: center; 
            font-weight: 500; 
            border: 1px solid #bbf7d0;
        }

        /* Таблица с адаптацией для мобильных */
        .table-responsive { 
            overflow-x: auto; 
            margin-top: 25px; 
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 700px; /* Чтобы таблица не сжималась в кашу на телефоне */
        }
        th, td { 
            border-bottom: 1px solid #e2e8f0; 
            padding: 12px 15px; 
            text-align: center; 
        }
        th { 
            background: #f8fafc; 
            font-weight: 600; 
            color: #475569;
        }
        tr:last-child td { border-bottom: none; }

        /* Правила для мобильных экранов */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .input-group { 
                max-width: 100%; 
                flex-basis: 100%; 
            }
            label { text-align: left; }
            input { text-align: left; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Прогноз масштабирования капитала</h2>
    
    <div class="input-row">
        <div class="input-group">
            <label>Стартовый капитал (₽)</label>
            <input type="number" id="startCap" value="100000">
        </div>
        <div class="input-group">
            <label>Средний ROI (%)</label>
            <input type="number" id="roi" value="98.5" step="0.1">
        </div>
    </div>

    <div class="input-row">
        <div class="input-group">
            <label>Цель 1 (₽/мес)</label>
            <input type="number" id="g1" value="100000">
        </div>
        <div class="input-group">
            <label>Цель 2 (₽/мес)</label>
            <input type="number" id="g2" value="300000">
        </div>
        <div class="input-group">
            <label>Цель 3 (₽/мес)</label>
            <input type="number" id="g3" value="500000">
        </div>
        <div class="input-group">
            <label>Цель 4 (₽/мес)</label>
            <input type="number" id="g4" value="1000000">
        </div>
    </div>
    
    <button onclick="calculate()">Рассчитать прогноз</button>

    <div id="alerts" class="alerts-container"></div>

    <div class="table-responsive">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>Месяц</th>
                    <th>Капитал на старте</th>
                    <th>Чистая прибыль</th>
                    <th>Вывод (Личный доход)</th>
                    <th>Капитал в реинвест</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    function formatCurrency(num) {
        return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(num);
    }

    function calculate() {
        let cap = parseFloat(document.getElementById('startCap').value) || 0;
        let roi = (parseFloat(document.getElementById('roi').value) || 0) / 100;
        let goals = [
            parseFloat(document.getElementById('g1').value) || 0,
            parseFloat(document.getElementById('g2').value) || 0,
            parseFloat(document.getElementById('g3').value) || 0,
            parseFloat(document.getElementById('g4').value) || 0
        ].sort((a,b) => a - b); 

        let tbody = document.querySelector('#resultTable tbody');
        let alerts = document.getElementById('alerts');
        tbody.innerHTML = '';
        alerts.innerHTML = '';
        
        let achieved = {};

        for (let month = 1; month <= 12; month++) {
            let profit = cap * roi;
            let payout = 0;

            for (let i = goals.length - 1; i >= 0; i--) {
                if (profit >= goals[i] && goals[i] > 0) {
                    payout = goals[i];
                    if (!achieved[goals[i]]) {
                        achieved[goals[i]] = month;
                        let div = document.createElement('div');
                        div.className = 'goal-alert';
                        div.style.display = 'block';
                        div.innerText = `Цель ${formatCurrency(goals[i])} достигнута на ${month}-й месяц! 🎉`;
                        alerts.appendChild(div);
                    }
                    break;
                }
            }

            let retained = profit - payout;
            let endCap = cap + retained;

            let row = `<tr>
                <td><strong>${month}</strong></td>
                <td>${formatCurrency(cap)}</td>
                <td style="color: #059669; font-weight: 500;">+ ${formatCurrency(profit)}</td>
                <td style="font-weight: bold; color: ${payout > 0 ? '#b91c1c' : '#333'}">${payout > 0 ? '- ' : ''}${formatCurrency(payout)}</td>
                <td style="font-weight: 500;">${formatCurrency(endCap)}</td>
            </tr>`;
            tbody.innerHTML += row;

            cap = endCap;
        }
    }
    
    window.onload = calculate;
</script>

</body>
</html>
