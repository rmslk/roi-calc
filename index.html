<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор сложного процента (4 цели)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .goal-alert { padding: 10px; background: #d4edda; color: #155724; border-radius: 4px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Прогноз оборачиваемости капитала</h2>
    
    <div class="grid">
        <div><label>Стартовый капитал (₽)</label><input type="number" id="startCap" value="100000"></div>
        <div><label>Средний ROI (%)</label><input type="number" id="roi" value="98.5" step="0.1"></div>
        <div><label>Цель 1 (₽/мес)</label><input type="number" id="g1" value="100000"></div>
        <div><label>Цель 2 (₽/мес)</label><input type="number" id="g2" value="300000"></div>
        <div><label>Цель 3 (₽/мес)</label><input type="number" id="g3" value="500000"></div>
        <div><label>Цель 4 (₽/мес)</label><input type="number" id="g4" value="1000000"></div>
    </div>
    
    <button onclick="calculate()">Рассчитать прогноз</button>

    <div id="alerts"></div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>Месяц</th>
                <th>Капитал на старте</th>
                <th>Чистая прибыль</th>
                <th>Вывод на себя</th>
                <th>Итоговый капитал</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    function formatCurrency(num) {
        return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(num);
    }

    function calculate() {
        let cap = parseFloat(document.getElementById('startCap').value);
        let roi = parseFloat(document.getElementById('roi').value) / 100;
        let goals = [
            parseFloat(document.getElementById('g1').value),
            parseFloat(document.getElementById('g2').value),
            parseFloat(document.getElementById('g3').value),
            parseFloat(document.getElementById('g4').value)
        ].sort((a,b) => a - b); // Сортируем цели по возрастанию

        let tbody = document.querySelector('#resultTable tbody');
        let alerts = document.getElementById('alerts');
        tbody.innerHTML = '';
        alerts.innerHTML = '';
        
        let achieved = {};

        for (let month = 1; month <= 12; month++) {
            let profit = cap * roi;
            let payout = 0;

            // Ищем максимально доступную цель
            for (let i = goals.length - 1; i >= 0; i--) {
                if (profit >= goals[i]) {
                    payout = goals[i];
                    if (!achieved[goals[i]]) {
                        achieved[goals[i]] = month;
                        let div = document.createElement('div');
                        div.className = 'goal-alert';
                        div.style.display = 'block';
                        div.innerText = `Цель ${formatCurrency(goals[i])} достигнута на ${month} месяц!`;
                        alerts.appendChild(div);
                    }
                    break;
                }
            }

            let retained = profit - payout;
            let endCap = cap + retained;

            let row = `<tr>
                <td>${month}</td>
                <td>${formatCurrency(cap)}</td>
                <td>${formatCurrency(profit)}</td>
                <td style="font-weight:bold; color: ${payout > 0 ? 'green' : 'black'}">${formatCurrency(payout)}</td>
                <td>${formatCurrency(endCap)}</td>
            </tr>`;
            tbody.innerHTML += row;

            cap = endCap;
        }
    }
    
    // Запуск расчета при первой загрузке
    window.onload = calculate;
</script>

</body>
</html>
